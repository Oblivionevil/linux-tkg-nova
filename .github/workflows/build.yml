name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      os:
        description: Builder OS
        required: false
        default: arch
        type: choice
        options:
          - arch
          - ubuntu
          - fedora
      _cpusched:
        description: CPU scheduler
        required: false
        default: eevdf
        type: choice
        options:
          - eevdf
          - bore
          - pds
          - bmq

jobs:
  build-default:
    if: github.event_name != 'workflow_dispatch'
    uses: ./.github/workflows/builder-dispatcher.yml
    with:
      os: arch
      _cpusched: eevdf

  build-manual:
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/builder-dispatcher.yml
    with:
      os: ${{ inputs.os }}
      _cpusched: ${{ inputs._cpusched }}