name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      _cpusched:
        description: CPU scheduler
        required: false
        default: eevdf
        type: choice
        options:
          - eevdf
          - bore
          - pds
          - bmq

jobs:
  build-default:
    if: github.event_name != 'workflow_dispatch'
    uses: ./.github/workflows/arch-builder.yml
    with:
      _cpusched: eevdf
      kernel_version: 7.0-latest
      config_file: linux-tkg-config/7.0-nova/config.x86_64

  build-manual:
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/arch-builder.yml
    with:
      _cpusched: ${{ inputs._cpusched }}
      kernel_version: 7.0-latest
      config_file: linux-tkg-config/7.0-nova/config.x86_64